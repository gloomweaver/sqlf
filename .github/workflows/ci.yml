name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build
        run: vp run -r build

      - name: Lint
        run: vp lint

      - name: Format check
        run: vp fmt

      - name: Test
        run: vp test

      - name: Example smoke test
        run: SQLF_SKIP_BUILD=1 vp run example:smoke

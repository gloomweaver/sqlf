services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "54329:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 1s
      timeout: 5s
      retries: 30
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
